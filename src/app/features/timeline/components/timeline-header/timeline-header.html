<div class="timeline-header">
  <h2>Work Orders</h2>

  <div class="zoom-control">
    <label>Timescale</label>

    <ng-select
      class="timescale-select"
      [items]="timescaleOptions"
      [formControl]="timescaleControl"
      [clearable]="false"
      [searchable]="false"
    >
    </ng-select>
  </div>
  <button class="btn-today btn-primary" (click)="scrollToToday.emit()">{{ todayLabel }}</button>
</div>
